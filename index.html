<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ASEAN Korea Beauty Trade Show Portal</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Tailwind Config for Pretendard Font -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Pretendard', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', '"Helvetica Neue"', 'Arial', 'sans-serif'],
          }
        }
      }
    }
  </script>
  
  <!-- Pretendard Font -->
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif !important;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background-color: #f9fafb;
      letter-spacing: -0.015em;
    }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
    
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    .animate-slide-up { animation: slideUp 0.4s ease-out forwards; }
    .animate-zoom-in { animation: zoomIn 0.2s ease-out forwards; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const Button = ({ children, onClick, variant = 'primary', type = 'button', className = '', disabled = false }) => {
      const baseStyle = "inline-flex items-center justify-center px-5 py-2.5 text-sm font-semibold transition-all duration-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed text-center";
      const variants = {
        primary: "bg-[#FDB827] text-gray-900 hover:bg-[#e5a620] hover:shadow-lg hover:-translate-y-0.5 focus:ring-[#FDB827]",
        secondary: "bg-gray-900 text-white hover:bg-gray-800 hover:shadow-lg hover:-translate-y-0.5 focus:ring-gray-900",
        danger: "bg-red-50 text-red-600 hover:bg-red-100 hover:text-red-700 focus:ring-red-500",
        outline: "border-2 border-gray-200 text-gray-700 hover:border-gray-300 hover:bg-gray-50 focus:ring-gray-200 bg-white",
        ghost: "text-gray-600 hover:bg-gray-100 hover:text-gray-900"
      };
      return (
        <button type={type} onClick={onClick} disabled={disabled} className={`${baseStyle} ${variants[variant]} ${className}`}>
          {children}
        </button>
      );
    };

    const Input = ({ label, value, onChange, type = 'text', required, isTextArea, placeholder }) => (
      <div className="mb-5">
        <label className="block text-sm font-semibold text-gray-700 mb-1.5">{label} {required && <span className="text-red-500">*</span>}</label>
        {isTextArea ? (
          <textarea value={value} onChange={onChange} required={required} placeholder={placeholder} 
            className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:outline-none focus:ring-2 focus:ring-[#FDB827] focus:border-transparent transition-colors min-h-[120px] resize-y" />
        ) : (
          <input type={type} value={value} onChange={onChange} required={required} placeholder={placeholder} 
            className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:outline-none focus:ring-2 focus:ring-[#FDB827] focus:border-transparent transition-colors" />
        )}
      </div>
    );

    const Modal = ({ isOpen, onClose, title, children }) => {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6 overflow-y-auto pt-16 sm:pt-20">
          <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm transition-opacity" onClick={onClose}></div>
          <div className="bg-white rounded-3xl shadow-2xl w-full max-w-5xl max-h-[calc(100vh-5rem)] flex flex-col relative z-10 transform transition-all animate-zoom-in">
            <div className="flex justify-between items-center p-5 sm:px-8 sm:py-6 border-b border-gray-100 flex-shrink-0">
              <h3 className="text-xl sm:text-2xl font-bold text-gray-900 tracking-tight">{title}</h3>
              <button onClick={onClose} className="p-2 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-full transition-colors">
                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>
              </button>
            </div>
            <div className="p-5 sm:p-8 overflow-y-auto flex-grow custom-scrollbar">
              {children}
            </div>
          </div>
        </div>
      );
    };

    const Card = ({ children, className = '', hover = false, onClick }) => (
      <div onClick={onClick} className={`bg-white rounded-2xl border border-gray-100 shadow-sm ${hover ? 'transition-all duration-300 hover:shadow-xl hover:-translate-y-1 cursor-pointer' : ''} ${className}`}>
        {children}
      </div>
    );

    const Badge = ({ status, isIncoming, isEnglish = false, className = '' }) => {
      const styles = {
        pending_outgoing: "bg-amber-100 text-amber-800 border-amber-200",
        pending_incoming: "bg-blue-100 text-blue-800 border-blue-200",
        accepted: "bg-emerald-100 text-emerald-800 border-emerald-200",
        declined: "bg-rose-100 text-rose-800 border-rose-200",
        default: "bg-gray-100 text-gray-800 border-gray-200"
      };
      
      let label = '';
      let styleKey = status;

      if (status === 'pending') {
          if (isIncoming) {
              label = isEnglish ? 'RECEIVED' : '제안 받음';
              styleKey = 'pending_incoming';
          } else {
              label = isEnglish ? 'REQUESTED' : '신청함';
              styleKey = 'pending_outgoing';
          }
      } else if (status === 'accepted') {
          label = isEnglish ? 'ACCEPTED' : '수락됨';
      } else if (status === 'declined') {
          label = isEnglish ? 'DECLINED' : '거절됨';
      } else {
          label = status.toUpperCase();
      }

      return (
        <span className={`px-2 py-1 sm:px-3 sm:py-1 rounded-full text-[10px] sm:text-xs font-bold tracking-wide border ${styles[styleKey] || styles.default} ${className}`}>
          {label}
        </span>
      );
    };

    const WebsiteLinks = ({ websites, className = "font-bold text-blue-600 hover:underline break-all" }) => {
      if (!websites) return <span>-</span>;
      const links = websites.split(',').map(s => s.trim()).filter(Boolean);
      if (links.length === 0) return <span>-</span>;
      
      return (
        <div className="flex flex-col gap-1.5">
          {links.map((link, idx) => {
             const href = link.startsWith('http') ? link : `https://${link}`;
             return (
               <a key={idx} href={href} target="_blank" rel="noreferrer" className={className}>
                 {link}
               </a>
             );
          })}
        </div>
      );
    };

    const initialData = {
      companies: [],
      buyers: [],
      meetings: [],
      meetingSettings: [],
      meetingSchedules: []
    };

    const getDriveId = (url) => {
      if(!url) return null;
      if(url.includes('/file/d/')) return url.split('/file/d/')[1].split('/')[0];
      if(url.includes('id=')) return url.split('id=')[1].split('&')[0];
      const match = url.match(/[-\w]{25,}/);
      return match ? match[0] : null;
    };

    const DriveImage = ({ url, alt, className, fallbackText = "No Image" }) => {
        const driveId = getDriveId(url);
        const primarySrc = React.useMemo(() => {
            if(!url) return null;
            if(url.match(/\.(jpeg|jpg|gif|png|webp)(\?.*)?$/i)) return url;
            if(url.match(/\.(ai|eps|psd|pdf)(\?.*)?$/i)) return `https://placehold.co/400x400/FDB827/ffffff?text=${url.split('.').pop().split('?')[0].toUpperCase()}+File`;
            if (driveId) return `https://lh3.googleusercontent.com/d/${driveId}=w800-h800-rw`;
            return url;
        }, [url, driveId]);

        const handleError = (e) => {
            if (driveId && !e.target.dataset.fallback) {
                e.target.dataset.fallback = 'true';
                e.target.src = `https://drive.google.com/thumbnail?id=${driveId}&sz=w800`;
            } else {
                e.target.onerror = null;
                e.target.src = `https://placehold.co/400x400/f1f5f9/94a3b8?text=${fallbackText.replace(/ /g, '+')}`;
            }
        };

        if (!primarySrc) return <span className="text-gray-400 font-bold tracking-widest uppercase text-xs sm:text-sm whitespace-nowrap flex items-center justify-center">{fallbackText}</span>;

        return <img src={primarySrc} alt={alt} className={className} onError={handleError} />;
    };

    const getYouTubeId = (url) => {
      if (!url) return null;
      const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
      const match = url.match(regExp);
      return (match && match[2].length === 11) ? match[2] : null;
    };

    const VideoPlayer = ({ url }) => {
      if (!url) return null;
      
      const ytId = getYouTubeId(url);
      const driveId = getDriveId(url);
      const isDirect = url.match(/\.(mp4|webm|ogg|mov)(\?.*)?$/i);

      if (!ytId && !driveId && !isDirect) return null;

      return (
        <div>
           <h4 className="font-extrabold text-gray-900 text-lg sm:text-xl mb-3 flex items-center"><span className="text-[#FDB827] mr-2">|</span> Promotional Video</h4>
           <div className="w-full aspect-video bg-black rounded-2xl overflow-hidden shadow-sm relative">
              {ytId ? (
                  <iframe src={`https://www.youtube.com/embed/${ytId}`} title="YouTube video" className="w-full h-full" frameBorder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowFullScreen></iframe>
              ) : driveId ? (
                  <iframe src={`https://drive.google.com/file/d/${driveId}/preview`} title="Google Drive video" className="w-full h-full" frameBorder="0" allow="autoplay; encrypted-media" allowFullScreen></iframe>
              ) : isDirect ? (
                  <video src={url} controls playsInline className="w-full h-full object-contain bg-black"></video>
              ) : null}
           </div>
        </div>
      );
    };

    const LoginView = ({ setSessionRole, setSessionData, showAlert, data }) => {
      const urlParams = new URLSearchParams(window.location.search);
      const passedId = urlParams.get('id') || '';
      const passedPw = urlParams.get('pw') || '';

      const [loginId, setLoginId] = useState(passedId);
      const [password, setPassword] = useState(passedPw);

      const handleLogin = (e) => {
        e.preventDefault();
        if (loginId === 'Bridging' && password === 'bridging1004!!') {
          setSessionRole('admin');
          setSessionData({ id: 'admin', loginId: 'admin', name: 'System Admin' });
          return;
        }
        
        const comp = data.companies.find(c => String(c.loginId) === String(loginId) && String(c.password) === String(password));
        if (comp) {
          setSessionRole('company');
          setSessionData(comp);
          return;
        }
        const buyer = data.buyers.find(b => String(b.loginId) === String(loginId) && String(b.password) === String(password));
        if (buyer) {
          setSessionRole('buyer');
          setSessionData(buyer);
          return;
        }
        showAlert("아이디 또는 비밀번호가 일치하지 않습니다. 다시 확인해주세요.\n(Invalid ID or Password.)");
      };

      const handleDevReset = () => {
        localStorage.removeItem('expo_data');
        localStorage.removeItem('expo_sessionRole');
        localStorage.removeItem('expo_sessionData');
        window.location.reload();
      };

      return (
        <div className="min-h-screen flex relative bg-white overflow-hidden">
          <div 
            className="absolute inset-0 z-0 bg-no-repeat bg-top lg:bg-left"
            style={{ 
              backgroundImage: `url('https://drive.google.com/thumbnail?id=1cPcVCt5c7AOHeAc55OcgfFd3oALFgSft&sz=w1920')`,
              backgroundSize: 'contain'
            }}
          />
          <div className="absolute inset-0 z-0 bg-white/30 lg:hidden" />

          <div className="w-full lg:w-[50%] xl:w-[45%] ml-auto relative z-10 flex flex-col items-center justify-center p-6 sm:p-12 xl:p-24 bg-white/85 lg:bg-white/60 backdrop-blur-xl lg:backdrop-blur-2xl border-l border-gray-100 shadow-2xl min-h-screen">
            <div className="w-full max-w-md relative z-10">
              <div className="text-center mb-8 sm:mb-10">
                <img 
                  src="https://drive.google.com/thumbnail?id=17xTdPbBYOs3wkX4r97tcnftCjUAX5bCO&sz=w400" 
                  alt="ASEAN Market Expo Logo" 
                  className="w-24 h-24 sm:w-32 sm:h-32 object-contain mx-auto rounded-2xl mb-4 sm:mb-6 shadow-xl shadow-amber-200/60 bg-white p-2"
                />
                <h1 className="text-3xl sm:text-4xl font-extrabold mb-2 sm:mb-3 text-gray-900 tracking-tight">ASEAN Korea Beauty Trade Show</h1>
                <p className="text-gray-800 text-base sm:text-lg font-semibold">Sign in to access your B2B dashboard.</p>
              </div>
              
              <Card className="p-6 sm:p-8 shadow-2xl shadow-gray-400/20 border border-white/80 bg-white/95 lg:bg-white/70 backdrop-blur-md">
                <form onSubmit={handleLogin} className="space-y-5 sm:space-y-6">
                  <Input label="Login ID" value={loginId} onChange={e => setLoginId(e.target.value)} required placeholder="Enter your ID" />
                  <Input label="Password" type="password" value={password} onChange={e => setPassword(e.target.value)} required placeholder="Enter your password" />
                  <Button type="submit" className="w-full text-base py-3 sm:py-3.5 mt-2 shadow-xl shadow-[#FDB827]/40">Sign In to Dashboard</Button>
                </form>
                
                <div className="mt-8 pt-8 border-t-2 border-dashed border-gray-200">
                  <div className="text-center mb-4">
                    <span className="inline-block px-3 py-1 bg-amber-100 text-amber-800 rounded-full text-xs font-black uppercase tracking-widest shadow-sm animate-bounce">New Buyer?</span>
                  </div>
                  <button 
                    type="button"
                    onClick={() => {
                      setSessionRole('guest');
                      setSessionData({ id: 'guest', loginId: 'guest', name: 'Guest Viewer' });
                    }}
                    className="w-full flex flex-col items-center justify-center px-4 py-4 sm:py-5 bg-gradient-to-br from-gray-900 to-gray-800 text-white rounded-2xl shadow-xl hover:shadow-2xl hover:-translate-y-1 transition-all duration-300 focus:outline-none focus:ring-4 focus:ring-gray-300 group"
                  >
                    <span className="text-lg sm:text-xl font-black tracking-wide flex items-center group-hover:text-[#FDB827] transition-colors">
                      Explore Expo & Sign Up!
                      <svg className="w-5 h-5 sm:w-6 sm:h-6 ml-2 transform group-hover:translate-x-2 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                    </span>
                    <span className="text-xs sm:text-sm font-medium text-gray-400 mt-1.5">Click here to browse brands and register</span>
                  </button>
                </div>
              </Card>

              <div className="mt-8 text-center">
                 <button onClick={handleDevReset} className="text-xs font-bold text-gray-400 hover:text-red-500 underline decoration-gray-300 underline-offset-4">⚙️ 데이터 강제 초기화 (오류 발생 시 클릭)</button>
              </div>

            </div>
          </div>
        </div>
      );
    };

    const AdminDashboard = ({ data, setData, showAlert, showConfirm }) => {
      const { companies = [], buyers = [], meetings = [] } = data || {};
      const [activeTab, setActiveTab] = useState('companies');

      const [viewingCompany, setViewingCompany] = useState(null);
      const [viewingBuyer, setViewingBuyer] = useState(null);

      const DetailRow = ({ label, value }) => (
        <div className="py-3 border-b border-gray-100 flex flex-col sm:flex-row gap-1 sm:gap-4 last:border-0">
          <span className="text-xs sm:text-sm font-bold text-gray-500 w-full sm:w-1/3 break-keep">{label}</span>
          <span className="text-sm text-gray-900 w-full sm:w-2/3 whitespace-pre-wrap break-all">{value || '-'}</span>
        </div>
      );

      const initialComp = { loginId: '', password: '', nameEn: '', brandEn: '', country: '', website: '', logoUrl: '', contactName: '', contactPhone: '', contactEmail: '', businessArea: '', introEn: '', competitiveness: '', products: '', exportStatus: '', targetBuyer: '', productImagesLink: '', productImage1: '', productImage2: '', productImage3: '', productImage4: '', productImage5: '', youtubeUrl: '' };
      const [isAddCompModal, setIsAddCompModal] = useState(false);
      const [newComp, setNewComp] = useState(initialComp);

      const initialBuyer = { loginId: '', password: '', firstName: '', lastName: '', position: '', mobile: '', email: '', timeSlots: '', companyName: '', country: '', website: '', address: '', businessType: '', targetCategories: '', history: '', logoUrl: '', officialEmail: '', companyIntro: '', employees: '', establishedYear: '', annualRevenue: '' };
      const [isAddBuyerModal, setIsAddBuyerModal] = useState(false);
      const [newBuyer, setNewBuyer] = useState(initialBuyer);

      const handleAddComp = (e) => {
        e.preventDefault();
        if(!newComp.loginId || !newComp.password || !newComp.brandEn) return showAlert("필수 항목을 입력해주세요.");
        
        const targetId = newComp.id || newComp.loginId;
        if (newComp.id) {
          setData(prev => ({ ...prev, companies: prev.companies.map(c => (c.id === newComp.id || c.loginId === newComp.loginId) ? { ...newComp, id: targetId } : c) }));
          showAlert("기업 정보가 성공적으로 수정되었습니다.");
        } else {
          setData(prev => ({ ...prev, companies: [{...newComp, id: newComp.loginId }, ...prev.companies] }));
          showAlert("새 기업이 추가되었습니다.");
        }
        setIsAddCompModal(false); 
        setNewComp(initialComp); 
      };

      const handleAddBuyer = (e) => {
        e.preventDefault();
        if(!newBuyer.loginId || !newBuyer.password || !newBuyer.companyName) return showAlert("필수 항목을 입력해주세요.");
        
        const targetId = newBuyer.id || newBuyer.loginId;
        if (newBuyer.id) {
          setData(prev => ({ ...prev, buyers: prev.buyers.map(b => (b.id === newBuyer.id || b.loginId === newBuyer.loginId) ? { ...newBuyer, id: targetId } : b) }));
          showAlert("바이어 정보가 성공적으로 수정되었습니다.");
        } else {
          setData(prev => ({ ...prev, buyers: [{...newBuyer, id: newBuyer.loginId }, ...prev.buyers] }));
          showAlert("새 바이어가 추가되었습니다.");
        }
        setIsAddBuyerModal(false); 
        setNewBuyer(initialBuyer); 
      };

      const deleteCompany = (key) => showConfirm("정말 이 기업을 삭제하시겠습니까?", () => setData(prev => ({ ...prev, companies: prev.companies.filter(c => c.id !== key && c.loginId !== key) })));
      const deleteBuyer = (key) => showConfirm("정말 이 바이어를 삭제하시겠습니까?", () => setData(prev => ({ ...prev, buyers: prev.buyers.filter(b => b.id !== key && b.loginId !== key) })));
      const deleteMeeting = (id) => showConfirm("정말 이 미팅을 삭제하시겠습니까?", () => setData(prev => ({ ...prev, meetings: prev.meetings.filter(m => m.id !== id) })));

      const tabs = [
        { id: 'companies', label: '기업', icon: '🏢' },
        { id: 'buyers', label: '바이어', icon: '👤' },
        { id: 'meetings', label: '미팅', icon: '🗓️' }
      ];

      return (
        <div className="p-4 sm:p-6 max-w-7xl mx-auto animate-fade-in">
          <div className="mb-6 sm:mb-8">
            <h1 className="text-2xl sm:text-3xl font-extrabold text-gray-900 tracking-tight">관리자 대시보드</h1>
            <p className="text-gray-500 mt-1 text-sm sm:text-base">사용자 계정, 프로필 및 미팅 요청을 통합 관리합니다.</p>
          </div>

          <div className="flex space-x-2 mb-6 border-b border-gray-200 pb-px overflow-x-auto hide-scrollbar">
            {tabs.map(tab => (
              <button key={tab.id} onClick={() => setActiveTab(tab.id)} 
                className={`flex items-center px-4 sm:px-5 py-3 text-sm font-bold rounded-t-xl transition-all whitespace-nowrap ${activeTab === tab.id ? 'bg-white text-blue-600 border border-gray-200 border-b-white shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] relative z-10 translate-y-px' : 'bg-transparent text-gray-500 hover:text-gray-700 hover:bg-gray-50'}`}>
                <span className="mr-2 text-lg">{tab.icon}</span> {tab.label} 관리
              </button>
            ))}
          </div>

          <div className="bg-white rounded-2xl shadow-sm border border-gray-200">
             {activeTab === 'companies' && (
              <div className="p-4 sm:p-6">
                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 sm:mb-6 gap-3">
                  <h2 className="text-lg font-bold text-gray-900">등록된 기업 ({companies.length})</h2>
                  <Button onClick={() => { setNewComp(initialComp); setIsAddCompModal(true); }} className="w-full sm:w-auto shadow-sm">✨ 새 기업 추가</Button>
                </div>
                <div className="overflow-x-auto rounded-xl border border-gray-100">
                  <table className="min-w-full divide-y divide-gray-200">
                    <thead className="bg-gray-50/50">
                      <tr>
                        <th className="px-4 sm:px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">로그인 ID</th>
                        <th className="px-4 sm:px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">브랜드명</th>
                        <th className="px-4 sm:px-6 py-4 text-right text-xs font-bold text-gray-500 uppercase tracking-wider">액션</th>

    const ScheduleModal = ({ isOpen, onClose, data, sessionData, sessionRole, handleSetData, showAlert, existingRecord }) => {
      const [selectedSlots, setSelectedSlots] = useState([]);
      const [selectedLanguage, setSelectedLanguage] = useState('English');

      const languageOptions = [
        { code: 'English', label: 'English', subLabel: sessionRole === 'buyer' ? 'English' : '한국어' },
        { code: 'Korean', label: 'Korean', subLabel: sessionRole === 'buyer' ? 'Korean' : '한국어' },
        { code: 'Indonesian', label: 'Indonesian', subLabel: sessionRole === 'buyer' ? 'Indonesian' : '인도네시아어' }
      ];

      useEffect(() => {
        if (isOpen) {
          if (existingRecord) {
            if (existingRecord['선택한 미팅 시간']) {
              setSelectedSlots(existingRecord['선택한 미팅 시간'].split(' || ').map(s => s.trim()).filter(Boolean));
            } else {
              setSelectedSlots([]);
            }
            const savedLang = existingRecord['통역 언어'] || existingRecord['interpretationLanguage'] || existingRecord['언어'];
            if (savedLang) {
              setSelectedLanguage(savedLang);
            } else {
              setSelectedLanguage('English');
            }
          } else {
            setSelectedSlots([]);
            setSelectedLanguage('English');
          }
        }
      }, [isOpen, existingRecord]);

      const getLocalizedTimeString = (item, userCountry, role) => {
        const prefix = item['미팅 시간'] || item['시간'] || ""; 
        let timeDetails = "";

        if (role === 'company') {
          timeDetails = item['Korea'] || item['korea'] || "";
        } else {
          let targetKey = "Korea"; 
          
          if (userCountry) {
            const countryLower = userCountry.toLowerCase();
            const matchedKey = Object.keys(item).find(key => 
                !['미팅 날짜', '미팅 시간', '날짜', '시간'].includes(key.toLowerCase()) && 
                (countryLower.includes(key.toLowerCase()) || key.toLowerCase().includes(countryLower))
            );
            
            if (matchedKey && item[matchedKey]) {
                targetKey = matchedKey;
            }
          }
          timeDetails = item[targetKey] || item['Korea'] || item['korea'] || "";
        }
        return timeDetails ? `${prefix} - ${timeDetails}` : prefix;
      };

      if (!isOpen || !data.meetingSettings) return null;

      const originalSettings = [...data.meetingSettings].reverse();

      const availableDates = Array.from(new Set(originalSettings.map(item => item['미팅 날짜'] || item['날짜']).filter(Boolean)));
      
      const timeTemplates = [];
      const seenTimes = new Set();
      originalSettings.forEach(item => {
          const timeName = item['미팅 시간'] || item['시간'];
          if (timeName && !seenTimes.has(timeName)) {
              seenTimes.add(timeName);
              timeTemplates.push(item);
          }
      });

      const toggleSlot = (slot) => {
        if (selectedSlots.includes(slot)) setSelectedSlots(selectedSlots.filter(s => s !== slot));
        else setSelectedSlots([...selectedSlots, slot]);
      };

      const handleSubmit = () => {
        if (selectedSlots.length === 0) {
          showAlert(sessionRole === 'buyer' ? "Please select at least one time slot." : "최소 1개 이상의 시간을 선택해주세요.");
          return;
        }

        const newSchedule = {
          id: existingRecord ? existingRecord.id : 'sch_' + Date.now(),
          '로그인 ID': sessionData.loginId,
          '구분': sessionRole === 'company' ? '참가기업' : '바이어',
          '이름/회사명': sessionData.companyName || sessionData.brandEn || sessionData.nameEn,
          '통역 언어': sessionRole === 'buyer' ? selectedLanguage : '해당없음(국내기업)',
          '선택한 미팅 시간': selectedSlots.join(' || '),
          '제출 일시': new Date().toLocaleString()
        };

        handleSetData(prev => {
          const schedules = prev.meetingSchedules || [];
          if (existingRecord) {
            return { ...prev, meetingSchedules: schedules.map(s => s.id === newSchedule.id ? newSchedule : s) };
          } else {
            return { ...prev, meetingSchedules: [newSchedule, ...schedules] };
          }
        });
        
        let successMsg = existingRecord 
           ? (sessionRole === 'buyer' ? "Your schedule has been updated successfully!" : "일정이 성공적으로 수정되었습니다!") 
           : (sessionRole === 'buyer' ? "Your online meeting availability has been saved successfully!" : "일정이 성공적으로 제출되었습니다!");
        
        showAlert(successMsg);
        onClose();
      };

      return (
        <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-gray-900/60 backdrop-blur-sm animate-fade-in">
          <div className="bg-white rounded-3xl shadow-2xl w-full max-w-4xl max-h-[85vh] flex flex-col relative z-10 animate-zoom-in">
            <div className="p-6 sm:p-8 border-b border-gray-100 bg-blue-50/50 rounded-t-3xl">
              <h3 className="text-2xl font-black text-blue-900 tracking-tight flex items-center">
                <span className="mr-3 text-3xl">🗓️</span> 
                {sessionRole === 'buyer' ? 'Available Online Meeting Dates & Interpretation Language' : '온라인 미팅 가능 시간 선택'}
              </h3>
              <p className="text-gray-600 mt-2 font-medium">
                {sessionRole === 'buyer' 
                  ? 'Please select your preferred interpretation language and all available time slots to facilitate smooth meeting matching.' 
                  : '원활한 미팅 매칭을 위해 온라인 미팅이 가능한 모든 시간대를 선택해주세요.'}
              </p>
            </div>
            
            <div className="p-6 sm:p-8 overflow-y-auto flex-grow custom-scrollbar space-y-6">
              {sessionRole === 'buyer' && (
                <div className="bg-amber-50/80 p-5 rounded-2xl border border-amber-200/90 shadow-sm">
                  <div className="flex items-center justify-between mb-3">
                    <label className="text-sm sm:text-base font-black text-gray-900 flex items-center">
                      <span className="text-xl mr-2">🗣️</span> Interpretation Language <span className="text-red-500 ml-1">*</span>
                    </label>
                    <span className="text-xs bg-amber-200/60 text-amber-900 px-2.5 py-1 rounded-full font-bold uppercase tracking-wider">Required</span>
                  </div>
                  <p className="text-xs sm:text-sm text-gray-600 mb-4 font-medium">
                    Select your preferred language for interpretation during 1:1 online meetings.
                  </p>
                  <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
                    {languageOptions.map((lang) => (
                      <button
                        key={lang.code}
                        type="button"
                        onClick={() => setSelectedLanguage(lang.code)}
                        className={`flex flex-col items-center justify-center p-3.5 rounded-xl font-bold transition-all duration-200 border-2 ${
                          selectedLanguage === lang.code
                            ? 'bg-[#FDB827] text-gray-900 border-[#e5a620] shadow-md transform -translate-y-0.5 ring-2 ring-[#FDB827]/40'
                            : 'bg-white text-gray-700 border-gray-200 hover:border-amber-300 hover:bg-amber-50/40'
                        }`}
                      >
                        <span className="text-base font-extrabold">{lang.label}</span>
                        <span className="text-[11px] text-gray-500 font-semibold mt-0.5">({lang.subLabel})</span>
                      </button>
                    ))}
                  </div>
                </div>
              )}

              {availableDates.length === 0 || timeTemplates.length === 0 ? (
                <p className="text-gray-500 text-center py-10 font-bold">
                  {sessionRole === 'buyer' ? 'No meeting schedules are currently available.' : '현재 설정된 미팅 일정이 없습니다.'}
                </p>
              ) : (
                availableDates.map((date) => (
                  <div key={date} className="bg-gray-50 p-5 sm:p-6 rounded-2xl border border-gray-200 shadow-sm">
                    <h4 className="font-extrabold text-xl text-gray-900 mb-4 flex items-center border-b border-gray-200 pb-3">
                      <span className="w-2.5 h-2.5 rounded-full bg-blue-500 mr-2.5"></span> {date}
                    </h4>
                    <div className="flex flex-col gap-3">
                      {timeTemplates.map((timeItem, idx) => {
                        const timeString = getLocalizedTimeString(timeItem, sessionData.country, sessionRole);
                        const slot = `[${date}] ${timeString}`;
                        const isSelected = selectedSlots.includes(slot);
                        
                        return (
                          <button
                            key={idx}
                            onClick={() => toggleSlot(slot)}
                            className={`text-left px-4 py-3.5 sm:px-5 sm:py-4 rounded-xl text-sm sm:text-base font-bold transition-all duration-200 border-2 flex items-start sm:items-center ${
                              isSelected 
                                ? 'bg-blue-600 text-white border-blue-600 shadow-md transform -translate-y-0.5' 
                                : 'bg-white text-gray-600 border-gray-200 hover:border-blue-300 hover:bg-blue-50'
                            }`}
                          >
                            <div className={`w-5 h-5 sm:w-6 sm:h-6 rounded-md border-2 mr-3 flex items-center justify-center flex-shrink-0 mt-0.5 sm:mt-0 ${isSelected ? 'border-white bg-blue-500' : 'border-gray-300 bg-white'}`}>
                              {isSelected && <svg className="w-3.5 h-3.5 sm:w-4 sm:h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"></path></svg>}
                            </div>
                            <span className="leading-relaxed">{timeString}</span>
                          </button>
                        );
                      })}
                    </div>
                  </div>
                ))
              )}
            </div>

            <div className="p-5 sm:p-6 border-t border-gray-100 bg-gray-50 rounded-b-3xl flex justify-end gap-3">
              <Button onClick={onClose} variant="ghost">
                {sessionRole === 'buyer' ? 'Close / Do it later' : '닫기 / 다음에 하기'}
              </Button>
              <Button onClick={handleSubmit} className="px-8 shadow-md">
                ✅ {existingRecord 
                    ? (sessionRole === 'buyer' ? 'Update Schedule & Language' : '일정 수정하기') 
                    : (sessionRole === 'buyer' ? 'Submit Schedule' : '일정 제출하기')}
              </Button>
            </div>
          </div>
        </div>
      );
    };

    const Layout = ({ sessionRole, setSessionRole, setSessionData, onOpenSchedule, children }) => (
      <div className="min-h-screen bg-gray-50/50 flex flex-col font-sans selection:bg-[#FDB827] selection:text-black">
        <nav className="bg-white border-b border-gray-200 sticky top-0 z-40 shadow-sm backdrop-blur-md bg-white/90">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div className="flex justify-between h-14 sm:h-20 items-center">
              <div className="flex items-center space-x-2 sm:space-x-4">
                 <div className="w-8 h-8 sm:w-10 sm:h-10 bg-[#FDB827] rounded-lg sm:rounded-xl flex items-center justify-center font-black text-gray-900 shadow-md flex-shrink-0 text-sm sm:text-base">A</div>
                 <span className="text-lg sm:text-2xl font-extrabold tracking-tight text-gray-900 truncate max-w-[160px] sm:max-w-none">ASEAN Korea Beauty Trade Show</span>
              </div>
              <div className="flex items-center space-x-2 sm:space-x-4">
                 {(sessionRole === 'company' || sessionRole === 'buyer') && (
                   <Button onClick={onOpenSchedule} variant="outline" className="hidden sm:inline-flex text-xs sm:text-sm px-3 py-1.5 sm:px-4 sm:py-2">
                      {sessionRole === 'buyer' ? '🗓️ Manage Schedule & Language' : '🗓️ 나의 미팅 일정 관리'}
                   </Button>
                 )}
                 {sessionRole === 'guest' && (
                   <a href="https://forms.gle/4mxgkCsDCQoozqNN8" target="_blank" rel="noreferrer" className="hidden sm:inline-flex items-center justify-center px-4 py-2 text-sm font-bold bg-[#FDB827] text-gray-900 rounded-lg hover:bg-amber-400 hover:shadow-md transition-all">
                      SIGN UP NOW
                   </a>
                 )}
                 <span className="hidden lg:inline-block text-xs font-bold px-3 py-1.5 bg-gray-100 rounded-lg text-gray-600 uppercase tracking-widest border border-gray-200">
                   {sessionRole === 'company' ? '기업 계정' : `Role: ${sessionRole}`}
                 </span>
                 <Button variant="ghost" onClick={() => { setSessionRole(null); setSessionData(null); }} className="text-xs sm:text-sm border border-gray-200 bg-white px-3 py-1.5 sm:px-5 sm:py-2.5">
                   {sessionRole === 'guest' ? 'Login' : sessionRole === 'company' ? '로그아웃' : 'Log Out'}
                 </Button>
              </div>
            </div>
          </div>
        </nav>
        <main className="flex-grow pt-4 sm:pt-6 pb-12">{children}</main>
      </div>
    );

    function App() {
      const [sessionRole, setSessionRole] = useState(() => localStorage.getItem('expo_sessionRole') || null);
      const [sessionData, setSessionData] = useState(() => {
        const saved = localStorage.getItem('expo_sessionData');
        if (saved) {
           try { return JSON.parse(saved); } catch(e) {}
        }
        return null;
      });

      useEffect(() => {
        if (sessionRole) localStorage.setItem('expo_sessionRole', sessionRole);
        else localStorage.removeItem('expo_sessionRole');
      }, [sessionRole]);

      useEffect(() => {
        if (sessionData) localStorage.setItem('expo_sessionData', JSON.stringify(sessionData));
        else localStorage.removeItem('expo_sessionData');
      }, [sessionData]);
      
      const [data, setData] = useState(() => {
        const saved = localStorage.getItem('expo_data');
        if(saved) {
           try { return JSON.parse(saved); } catch(e) {}
        }
        return initialData;
      });

      const [alertMsg, setAlertMsg] = useState('');
      const [confirmMsg, setConfirmMsg] = useState('');
      const [onConfirm, setOnConfirm] = useState(null);
      const [isLoading, setIsLoading] = useState(true);

      const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyDK5sINH_5FS8iqmecDQPKk44pfms62mTEdKDKnnqjVsx_ZVAGqxY-l6YRcBFzjstZ9A/exec"; 

      const normalizeSheetData = (rawData) => {
        const result = { companies: [], buyers: [], meetings: [], meetingSettings: [], meetingSchedules: [] };
        if (!rawData) return result;
        
        const normalizeMeetings = (meetingsList) => {
            if (!meetingsList) return [];
            return meetingsList.map(m => {
                let st = String(m.status || m['진행상태'] || m['상태'] || '').toLowerCase();
                if (st.includes('pending') || st.includes('requested') || st.includes('대기중')) m.status = 'pending';
                else if (st.includes('accepted') || st.includes('수락됨')) m.status = 'accepted';
                else if (st.includes('declined') || st.includes('거절됨')) m.status = 'declined';
                return m;
            });
        };

        Object.keys(rawData).forEach(key => {
          const lowerKey = key.toLowerCase().trim();
          if (['companies', 'company', '기업', '참가기업', '브랜드'].includes(lowerKey)) {
            result.companies = rawData[key];
          } else if (['buyers', 'buyer', '바이어', '구매자'].includes(lowerKey)) {
            result.buyers = rawData[key];
          } else if (['meetings', 'meeting', '미팅', '예약'].includes(lowerKey)) {
            result.meetings = normalizeMeetings(rawData[key]);
          } else if (['meetingsettings', '온라인미팅 설정', '온라인미팅설정'].includes(lowerKey)) {
            result.meetingSettings = rawData[key];
          } else if (['meetingschedules', '온라인미팅 일정', '온라인미팅일정'].includes(lowerKey)) {
            result.meetingSchedules = rawData[key];
          }
        });
        
        if (result.companies.length === 0 && rawData.companies) result.companies = rawData.companies;
        if (result.buyers.length === 0 && rawData.buyers) result.buyers = rawData.buyers;
        if (result.meetingSettings.length === 0 && rawData.meetingSettings) result.meetingSettings = rawData.meetingSettings;
        if (result.meetingSchedules.length === 0 && rawData.meetingSchedules) result.meetingSchedules = rawData.meetingSchedules;
        if (result.meetings.length === 0 && rawData.meetings) result.meetings = normalizeMeetings(rawData.meetings);
        
        return result;
      };

      useEffect(() => {
        const fetchGoogleSheetData = async () => {
          if (!APPS_SCRIPT_URL) {
            setIsLoading(false); 
            return;
          }
          try {
            const response = await fetch(APPS_SCRIPT_URL);
            const sheetData = await response.json();
            
            if (sheetData && typeof sheetData === 'object' && !Array.isArray(sheetData)) {
              const normalizedData = normalizeSheetData(sheetData);
              setData(normalizedData);
              localStorage.setItem('expo_data', JSON.stringify(normalizedData)); 
            }
          } catch (error) {
            console.error("구글 시트 연동 오류:", error);
          } finally {
            setIsLoading(false);
          }
        };

        fetchGoogleSheetData();
      }, []);

      const handleSetData = async (updater) => {
        setData((prev) => {
          const newData = typeof updater === 'function' ? updater(prev) : updater;
          localStorage.setItem('expo_data', JSON.stringify(newData));
          return newData;
        });

        if (APPS_SCRIPT_URL) {
          try {
            const response = await fetch(APPS_SCRIPT_URL);
            const latestSheetData = await response.json();
            const normalizedLatest = normalizeSheetData(latestSheetData);

            const freshDataToSave = typeof updater === 'function' ? updater(normalizedLatest) : updater;

            await fetch(APPS_SCRIPT_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'text/plain;charset=utf-8' },
              body: JSON.stringify(freshDataToSave),
            });

            setData(freshDataToSave);
            localStorage.setItem('expo_data', JSON.stringify(freshDataToSave));
          } catch (error) {
            console.error("구글 시트 동기화 실패:", error);
          }
        }
      };

      const showAlert = (msg) => setAlertMsg(msg);
      const showConfirm = (msg, callback) => { setConfirmMsg(msg); setOnConfirm(() => callback); };
      const handleConfirmExecute = () => { if (onConfirm) onConfirm(); setConfirmMsg(''); setOnConfirm(null); };

      const userScheduleRecord = useMemo(() => {
        if (!sessionData || !data.meetingSchedules) return null;
        return data.meetingSchedules.find(s => String(s['로그인 ID']) === String(sessionData.loginId));
      }, [sessionData, data.meetingSchedules]);

      const hasSubmittedSchedule = !!userScheduleRecord;
      
      const [showBuyerNotice, setShowBuyerNotice] = useState(false);
      const [buyerNoticeClosed, setBuyerNoticeClosed] = useState(false);
      const [showScheduleModal, setShowScheduleModal] = useState(false);

      useEffect(() => {
        if (isLoading) return;

        if (sessionRole === 'buyer' && !buyerNoticeClosed) {
           setShowBuyerNotice(true);
           return; 
        }

        if ((sessionRole === 'company' || sessionRole === 'buyer') && !hasSubmittedSchedule) {
           setShowScheduleModal(true);
        }
      }, [sessionRole, isLoading, hasSubmittedSchedule, buyerNoticeClosed]);
      
      if (isLoading) {
        return (
          <div className="min-h-screen flex items-center justify-center bg-gray-50 relative overflow-hidden px-4">
             <div className="absolute inset-0 bg-cover bg-left lg:bg-center bg-no-repeat opacity-10" style={{ backgroundImage: `url('https://drive.google.com/thumbnail?id=1cPcVCt5c7AOHeAc55OcgfFd3oALFgSft&sz=w1920')` }}></div>
             <div className="relative z-10 flex flex-col items-center bg-white/80 p-6 sm:p-8 rounded-3xl backdrop-blur-sm shadow-xl text-center">
                <div className="w-12 h-12 sm:w-16 sm:h-16 border-4 border-[#FDB827] border-t-transparent rounded-full animate-spin mb-4 sm:mb-6"></div>
                <p className="text-gray-900 font-extrabold text-lg sm:text-xl tracking-tight">Syncing data...</p>
             </div>
          </div>
        );
      }

      return (
        <React.Fragment>
          {!sessionRole ? (
            <LoginView setSessionRole={setSessionRole} setSessionData={setSessionData} showAlert={showAlert} data={data} />
          ) : (
            <Layout sessionRole={sessionRole} setSessionRole={setSessionRole} setSessionData={setSessionData} onOpenSchedule={() => setShowScheduleModal(true)}>
              {sessionRole === 'admin' && <AdminDashboard data={data} setData={handleSetData} showAlert={showAlert} showConfirm={showConfirm} />}
              {sessionRole === 'company' && <CompanyDashboard sessionData={sessionData} data={data} setData={handleSetData} showAlert={showAlert} showConfirm={showConfirm} />}
              {sessionRole === 'buyer' && <BuyerDashboard sessionData={sessionData} data={data} setData={handleSetData} showAlert={showAlert} showConfirm={showConfirm} />}
              {sessionRole === 'guest' && <GuestDashboard data={data} />}
            </Layout>
          )}

          <Modal 
             isOpen={showBuyerNotice} 
             onClose={() => { setShowBuyerNotice(false); setBuyerNoticeClosed(true); }} 
             title="📢 Action Required"
          >
            <div className="flex flex-col items-center justify-center text-center py-4 sm:py-6">
              <div className="w-16 h-16 sm:w-20 sm:h-20 bg-amber-100 text-amber-500 rounded-full flex items-center justify-center mb-5">
                 <svg className="w-8 h-8 sm:w-10 sm:h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
              </div>
              <p className="text-gray-900 text-lg sm:text-xl font-extrabold mb-4 leading-tight">
                Please select the Korean companies you would like to meet with.
              </p>
              <p className="text-red-500 font-black text-base sm:text-lg mb-6 bg-red-50 px-4 py-1.5 rounded-lg border border-red-100">
                Minimum of 7 companies
              </p>
              <p className="text-gray-600 text-sm sm:text-base font-medium mb-8 max-w-2xl bg-gray-50 p-4 rounded-xl border border-gray-100">
                * If it is not possible to arrange an offline meeting with your selected companies, online meetings may be scheduled according to the availability you previously submitted.
              </p>
              <Button onClick={() => { setShowBuyerNotice(false); setBuyerNoticeClosed(true); }} className="w-full sm:w-auto px-10 py-3 sm:py-4 shadow-xl text-base">
                Confirm
              </Button>
            </div>
          </Modal>

          {sessionData && data.meetingSettings && (
             <ScheduleModal
               isOpen={showScheduleModal}
               onClose={() => setShowScheduleModal(false)}
               data={data}
               sessionData={sessionData}
               sessionRole={sessionRole}
               handleSetData={handleSetData}
               showAlert={showAlert}
               existingRecord={userScheduleRecord}
             />
          )}
          
          <Modal 
             isOpen={!!alertMsg} 
             onClose={() => setAlertMsg('')} 
             title={sessionRole === 'buyer' ? 'Notification' : '알림 (Notification)'}
          >
            <div className="flex flex-col items-center justify-center text-center py-4">
              <div className="w-12 h-12 sm:w-16 sm:h-16 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center mb-4"><svg className="w-6 h-6 sm:w-8 sm:h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg></div>
              <p className="text-gray-700 text-base sm:text-lg font-bold mb-6 sm:mb-8 whitespace-pre-wrap">{alertMsg}</p>
              <Button onClick={() => setAlertMsg('')} className="w-full sm:w-auto px-8">
                 {sessionRole === 'buyer' ? 'OK' : '확인 (OK)'}
              </Button>
            </div>
          </Modal>
          
          <Modal 
             isOpen={!!confirmMsg} 
             onClose={() => setConfirmMsg('')} 
             title={sessionRole === 'buyer' ? 'Action Required' : '확인 필요 (Action Required)'}
          >
            <div className="flex flex-col items-center justify-center text-center py-4">
              <div className="w-12 h-12 sm:w-16 sm:h-16 bg-amber-50 text-amber-500 rounded-full flex items-center justify-center mb-4"><svg className="w-6 h-6 sm:w-8 sm:h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg></div>
              <p className="text-gray-700 text-base sm:text-lg font-bold mb-6 sm:mb-8">{confirmMsg}</p>
              <div className="flex flex-col sm:flex-row w-full justify-center gap-3">
                <Button variant="ghost" onClick={() => setConfirmMsg('')} className="w-full sm:w-auto">
                   {sessionRole === 'buyer' ? 'Cancel' : '취소 (Cancel)'}
                </Button>
                <Button onClick={handleConfirmExecute} variant="danger" className="w-full sm:w-auto">
                   {sessionRole === 'buyer' ? 'Confirm' : '실행 (Confirm)'}
                </Button>
              </div>
            </div>
          </Modal>
        </React.Fragment>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
