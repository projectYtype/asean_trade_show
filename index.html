<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ASEAN Market Expo Portal</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel (for compiling JSX in browser) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
    
    /* 모바일에서 탭 스크롤바 숨기기 위한 유틸리티 */
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    .animate-slide-up { animation: slideUp 0.4s ease-out forwards; }
    .animate-zoom-in { animation: zoomIn 0.2s ease-out forwards; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const Button = ({ children, onClick, variant = 'primary', type = 'button', className = '', disabled = false }) => {
      const baseStyle = "inline-flex items-center justify-center px-5 py-2.5 text-sm font-semibold transition-all duration-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed text-center";
      const variants = {
        primary: "bg-[#FDB827] text-gray-900 hover:bg-[#e5a620] hover:shadow-lg hover:-translate-y-0.5 focus:ring-[#FDB827]",
        secondary: "bg-gray-900 text-white hover:bg-gray-800 hover:shadow-lg hover:-translate-y-0.5 focus:ring-gray-900",
        danger: "bg-red-50 text-red-600 hover:bg-red-100 hover:text-red-700 focus:ring-red-500",
        outline: "border-2 border-gray-200 text-gray-700 hover:border-gray-300 hover:bg-gray-50 focus:ring-gray-200 bg-white",
        ghost: "text-gray-600 hover:bg-gray-100 hover:text-gray-900"
      };
      return (
        <button type={type} onClick={onClick} disabled={disabled} className={`${baseStyle} ${variants[variant]} ${className}`}>
          {children}
        </button>
      );
    };

    const Input = ({ label, value, onChange, type = 'text', required, isTextArea, placeholder }) => (
      <div className="mb-5">
        <label className="block text-sm font-semibold text-gray-700 mb-1.5">{label} {required && <span className="text-red-500">*</span>}</label>
        {isTextArea ? (
          <textarea value={value} onChange={onChange} required={required} placeholder={placeholder} 
            className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:outline-none focus:ring-2 focus:ring-[#FDB827] focus:border-transparent transition-colors min-h-[120px] resize-y" />
        ) : (
          <input type={type} value={value} onChange={onChange} required={required} placeholder={placeholder} 
            className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:bg-white focus:outline-none focus:ring-2 focus:ring-[#FDB827] focus:border-transparent transition-colors" />
        )}
      </div>
    );

    const Modal = ({ isOpen, onClose, title, children }) => {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6">
          <div className="absolute inset-0 bg-gray-900/60 backdrop-blur-sm transition-opacity" onClick={onClose}></div>
          <div className="bg-white rounded-3xl shadow-2xl w-full max-w-5xl max-h-[90vh] flex flex-col relative z-10 transform transition-all animate-zoom-in">
            <div className="flex justify-between items-center p-5 sm:px-8 sm:py-6 border-b border-gray-100 flex-shrink-0">
              <h3 className="text-xl sm:text-2xl font-bold text-gray-900 tracking-tight">{title}</h3>
              <button onClick={onClose} className="p-2 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-full transition-colors">
                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>
              </button>
            </div>
            <div className="p-5 sm:p-8 overflow-y-auto flex-grow custom-scrollbar">
              {children}
            </div>
          </div>
        </div>
      );
    };

    const Card = ({ children, className = '', hover = false, onClick }) => (
      <div onClick={onClick} className={`bg-white rounded-2xl border border-gray-100 shadow-sm ${hover ? 'transition-all duration-300 hover:shadow-xl hover:-translate-y-1 cursor-pointer' : ''} ${className}`}>
        {children}
      </div>
    );

    const Badge = ({ status, children, className = '' }) => {
      const styles = {
        pending: "bg-amber-100 text-amber-800 border-amber-200",
        accepted: "bg-emerald-100 text-emerald-800 border-emerald-200",
        declined: "bg-rose-100 text-rose-800 border-rose-200",
        default: "bg-gray-100 text-gray-800 border-gray-200"
      };
      return (
        <span className={`px-2 py-1 sm:px-3 sm:py-1 rounded-full text-[10px] sm:text-xs font-bold tracking-wide border ${styles[status] || styles.default} ${className}`}>
          {children || status.toUpperCase()}
        </span>
      );
    };

    const initialData = {
      companies: [
        {
          id: 'comp_1', loginId: 'COMP01', password: 'pass123', nameEn: 'Korea Tech Co., Ltd.', brandEn: 'K-Tech',
          contactName: 'Jane Doe / Manager', contactPhone: '+82 10-1234-5678', contactEmail: 'jane@ktech.kr',
          introEn: 'Leading provider of innovative tech solutions specializing in AI and cloud infrastructure.', businessType: 'Manufacturer',
          productCategory: 'Electronics & Software', moq: 'Product A: $50 / MOQ: 100\nProduct B: $120 / MOQ: 50',
          logoUrl: '',
        }
      ],
      buyers: [
        {
          id: 'buyer_1', loginId: 'BUYER01', password: 'pass123', firstName: 'John', lastName: 'Smith',
          position: 'Sourcing Director', mobile: '+65 9876 5432', email: 'john@globalsourcing.sg',
          companyName: 'Global Sourcing PTE LTD', businessType: 'Distributor', website: 'https://globalsourcing.sg',
          history: 'Cooperated with several beauty brand manufacturers in 2024. Looking for tech partners this year.', annualSales: '$5M USD',
          preferredContact: 'Email', address: 'Marina Bay Financial Centre, Singapore', officialPhone: '+65 6789 0123',
          officialEmail: 'info@globalsourcing.sg', attendanceDate: '2026-08-24'
        }
      ],
      meetings: []
    };

    const formatDriveLink = (url) => {
      if(!url) return null;
      if(url.includes('drive.google.com/file/d/')) {
          const id = url.split('/d/')[1].split('/')[0];
          return `https://drive.google.com/thumbnail?id=${id}&sz=w800`;
      }
      return url;
    };

    const LoginView = ({ setSessionRole, setSessionData, showAlert, data }) => {
      const [loginId, setLoginId] = useState('');
      const [password, setPassword] = useState('');

      const handleLogin = (e) => {
        e.preventDefault();
        if (loginId === 'Bridging' && password === 'bridging1004!!') {
          setSessionRole('admin');
          setSessionData({ id: 'admin', name: 'System Admin' });
          return;
        }
        
        // 데이터와 입력값을 모두 문자열(String)로 명시적 변환 후 비교합니다.
        const comp = data.companies.find(c => String(c.loginId) === String(loginId) && String(c.password) === String(password));
        if (comp) {
          setSessionRole('company');
          setSessionData(comp);
          return;
        }
        const buyer = data.buyers.find(b => String(b.loginId) === String(loginId) && String(b.password) === String(password));
        if (buyer) {
          setSessionRole('buyer');
          setSessionData(buyer);
          return;
        }
        showAlert("Invalid ID or Password. Please check your credentials.");
      };

      return (
        <div className="min-h-screen flex relative bg-white overflow-hidden">
          <div 
            className="absolute inset-0 z-0 bg-no-repeat bg-top lg:bg-left"
            style={{ 
              backgroundImage: `url('https://drive.google.com/thumbnail?id=1cPcVCt5c7AOHeAc55OcgfFd3oALFgSft&sz=w1920')`,
              backgroundSize: 'contain'
            }}
          />
          <div className="absolute inset-0 z-0 bg-white/30 lg:hidden" />

          <div className="w-full lg:w-[50%] xl:w-[45%] ml-auto relative z-10 flex flex-col items-center justify-center p-6 sm:p-12 xl:p-24 bg-white/85 lg:bg-white/60 backdrop-blur-xl lg:backdrop-blur-2xl border-l border-gray-100 shadow-2xl min-h-screen">
            <div className="w-full max-w-md relative z-10">
              <div className="text-center mb-8 sm:mb-10">
                <img 
                  src="https://drive.google.com/thumbnail?id=17xTdPbBYOs3wkX4r97tcnftCjUAX5bCO&sz=w400" 
                  alt="ASEAN Market Expo Logo" 
                  className="w-24 h-24 sm:w-32 sm:h-32 object-contain mx-auto rounded-2xl mb-4 sm:mb-6 shadow-xl shadow-amber-200/60 bg-white p-2"
                />
                <h1 className="text-3xl sm:text-4xl font-extrabold mb-2 sm:mb-3 text-gray-900 tracking-tight">ASEAN Market Expo</h1>
                <p className="text-gray-800 text-base sm:text-lg font-semibold">Sign in to access your B2B dashboard.</p>
              </div>
              
              <Card className="p-6 sm:p-8 shadow-2xl shadow-gray-400/20 border border-white/80 bg-white/95 lg:bg-white/70 backdrop-blur-md">
                <form onSubmit={handleLogin} className="space-y-5 sm:space-y-6">
                  <Input label="Login ID" value={loginId} onChange={e => setLoginId(e.target.value)} required placeholder="Enter your ID" />
                  <Input label="Password" type="password" value={password} onChange={e => setPassword(e.target.value)} required placeholder="Enter your password" />
                  <Button type="submit" className="w-full text-base py-3 sm:py-3.5 mt-2 shadow-xl shadow-[#FDB827]/40">Sign In to Dashboard</Button>
                </form>
              </Card>
            </div>
          </div>
        </div>
      );
    };

    const AdminDashboard = ({ data, setData, showAlert, showConfirm }) => {
      const { companies = [], buyers = [], meetings = [] } = data || {};
      const [activeTab, setActiveTab] = useState('companies');
      const [isAddCompanyModalOpen, setIsAddCompanyModalOpen] = useState(false);
      const [newCompany, setNewCompany] = useState({});
      const [isAddBuyerModalOpen, setIsAddBuyerModalOpen] = useState(false);
      const [newBuyer, setNewBuyer] = useState({});

      const handleAddCompany = (e) => {
        e.preventDefault();
        const newId = 'comp_' + Date.now();
        setData(prev => ({ ...prev, companies: [...prev.companies, { ...newCompany, id: newId }] }));
        setIsAddCompanyModalOpen(false); setNewCompany({}); showAlert("Company profile added successfully.");
      };

      const handleAddBuyer = (e) => {
        e.preventDefault();
        const newId = 'buyer_' + Date.now();
        setData(prev => ({ ...prev, buyers: [...prev.buyers, { ...newBuyer, id: newId }] }));
        setIsAddBuyerModalOpen(false); setNewBuyer({}); showAlert("Buyer profile added successfully.");
      };

      const deleteCompany = (id) => showConfirm("Delete this company?", () => setData(prev => ({ ...prev, companies: prev.companies.filter(c => c.id !== id) })));
      const deleteBuyer = (id) => showConfirm("Delete this buyer?", () => setData(prev => ({ ...prev, buyers: prev.buyers.filter(b => b.id !== id) })));
      const deleteMeeting = (id) => showConfirm("Delete this meeting?", () => setData(prev => ({ ...prev, meetings: prev.meetings.filter(m => m.id !== id) })));
      const updateMeetingStatus = (id, status) => setData(prev => ({ ...prev, meetings: prev.meetings.map(m => m.id === id ? { ...m, status } : m) }));

      const tabs = [
        { id: 'companies', label: 'Companies', icon: '🏢' },
        { id: 'buyers', label: 'Buyers', icon: '👤' },
        { id: 'meetings', label: 'Meetings', icon: '🤝' }
      ];

      return (
        <div className="p-4 sm:p-6 max-w-7xl mx-auto animate-fade-in">
          <div className="mb-6 sm:mb-8">
            <h1 className="text-2xl sm:text-3xl font-extrabold text-gray-900 tracking-tight">Platform Administration</h1>
            <p className="text-gray-500 mt-1 text-sm sm:text-base">Manage users, profiles, and expo interactions.</p>
          </div>

          <div className="flex space-x-2 mb-6 border-b border-gray-200 pb-px overflow-x-auto hide-scrollbar">
            {tabs.map(tab => (
              <button key={tab.id} onClick={() => setActiveTab(tab.id)} 
                className={`flex items-center px-4 sm:px-5 py-3 text-sm font-bold rounded-t-xl transition-all whitespace-nowrap ${activeTab === tab.id ? 'bg-white text-blue-600 border border-gray-200 border-b-white shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] relative z-10 translate-y-px' : 'bg-transparent text-gray-500 hover:text-gray-700 hover:bg-gray-50'}`}>
                <span className="mr-2 text-lg">{tab.icon}</span> Manage {tab.label}
              </button>
            ))}
          </div>

          <div className="bg-white rounded-2xl shadow-sm border border-gray-200">
            {activeTab === 'companies' && (
              <div className="p-4 sm:p-6">
                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 sm:mb-6 gap-3">
                  <h2 className="text-lg font-bold text-gray-900">Registered Companies ({companies.length})</h2>
                  <Button onClick={() => setIsAddCompanyModalOpen(true)} className="w-full sm:w-auto">+ Add New Company</Button>
                </div>
                <div className="overflow-x-auto rounded-xl border border-gray-100">
                  <table className="min-w-full divide-y divide-gray-200">
                    <thead className="bg-gray-50/50">
                      <tr>
                        <th className="px-4 sm:px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Login ID</th>
                        <th className="px-4 sm:px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Brand Name</th>
                        <th className="px-4 sm:px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Company Name</th>
                        <th className="px-4 sm:px-6 py-4 text-right text-xs font-bold text-gray-500 uppercase tracking-wider">Actions</th>
                      </tr>
                    </thead>
                    <tbody className="bg-white divide-y divide-gray-100">
                      {companies.map(c => (
                        <tr key={c.id} className="hover:bg-gray-50/50 transition-colors">
                          <td className="px-4 sm:px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">{c.loginId}</td>
                          <td className="px-4 sm:px-6 py-4 whitespace-nowrap text-sm font-bold text-gray-900">{c.brandEn}</td>
                          <td className="px-4 sm:px-6 py-4 whitespace-nowrap text-sm text-gray-500">{c.nameEn}</td>
                          <td className="px-4 sm:px-6 py-4 whitespace-nowrap text-right text-sm">
                            <button onClick={() => deleteCompany(c.id)} className="text-red-500 hover:text-red-700 font-bold px-3 py-1 rounded-md hover:bg-red-50 transition-colors">Delete</button>
                          </td>
                        </tr>
                      ))}
                      {companies.length === 0 && <tr><td colSpan="4" className="px-6 py-12 text-center text-gray-400">No companies registered yet.</td></tr>}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {activeTab === 'buyers' && (
              <div className="p-4 sm:p-6">
                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 sm:mb-6 gap-3">
                  <h2 className="text-lg font-bold text-gray-900">Registered Buyers ({buyers.length})</h2>
                  <Button onClick={() => setIsAddBuyerModalOpen(true)} className="w-full sm:w-auto">+ Add New Buyer</Button>
                </div>
                <div className="overflow-x-auto rounded-xl border border-gray-100">
                  <table className="min-w-full divide-y divide-gray-200">
                    <thead className="bg-gray-50/50">
                      <tr>
                        <th className="px-4 sm:px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Login ID</th>
                        <th className="px-4 sm:px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Company</th>
                        <th className="px-4 sm:px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Representative</th>
                        <th className="px-4 sm:px-6 py-4 text-right text-xs font-bold text-gray-500 uppercase tracking-wider">Actions</th>
                      </tr>
                    </thead>
                    <tbody className="bg-white divide-y divide-gray-100">
                      {buyers.map(b => (
                        <tr key={b.id} className="hover:bg-gray-50/50 transition-colors">
                          <td className="px-4 sm:px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">{b.loginId}</td>
                          <td className="px-4 sm:px-6 py-4 whitespace-nowrap text-sm font-bold text-blue-600">{b.companyName}</td>
                          <td className="px-4 sm:px-6 py-4 whitespace-nowrap text-sm text-gray-500">{b.firstName} {b.lastName}</td>
                          <td className="px-4 sm:px-6 py-4 whitespace-nowrap text-right text-sm">
                            <button onClick={() => deleteBuyer(b.id)} className="text-red-500 hover:text-red-700 font-bold px-3 py-1 rounded-md hover:bg-red-50 transition-colors">Delete</button>
                          </td>
                        </tr>
                      ))}
                      {buyers.length === 0 && <tr><td colSpan="4" className="px-6 py-12 text-center text-gray-400">No buyers registered yet.</td></tr>}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

            {activeTab === 'meetings' && (
              <div className="p-4 sm:p-6">
                <h2 className="text-lg font-bold text-gray-900 mb-4 sm:mb-6">Meeting Requests ({meetings.length})</h2>
                <div className="overflow-x-auto rounded-xl border border-gray-100">
                  <table className="min-w-full divide-y divide-gray-200">
                    <thead className="bg-gray-50/50">
                      <tr>
                        <th className="px-4 sm:px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Korean Company</th>
                        <th className="px-4 sm:px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Buyer Company</th>
                        <th className="px-4 sm:px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Initiator</th>
                        <th className="px-4 sm:px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Status</th>
                        <th className="px-4 sm:px-6 py-4 text-right text-xs font-bold text-gray-500 uppercase tracking-wider">Admin Actions</th>
                      </tr>
                    </thead>
                    <tbody className="bg-white divide-y divide-gray-100">
                      {meetings.map(m => {
                        const comp = companies.find(c => c.id === m.companyId);
                        const buyer = buyers.find(b => b.id === m.buyerId);
                        return (
                          <tr key={m.id} className="hover:bg-gray-50/50 transition-colors">
                            <td className="px-4 sm:px-6 py-4 whitespace-nowrap text-sm font-bold text-gray-900">{comp?.brandEn || 'Unknown'}</td>
                            <td className="px-4 sm:px-6 py-4 whitespace-nowrap text-sm font-bold text-blue-600">{buyer?.companyName || 'Unknown'}</td>
                            <td className="px-4 sm:px-6 py-4 whitespace-nowrap text-xs font-semibold text-gray-500 uppercase">
                              <span className={`px-2 py-1 rounded-md ${m.requestedBy === 'company' ? 'bg-amber-50 text-amber-700' : 'bg-blue-50 text-blue-700'}`}>
                                {m.requestedBy === 'company' ? 'Company' : 'Buyer'}
                              </span>
                            </td>
                            <td className="px-4 sm:px-6 py-4 whitespace-nowrap"><Badge status={m.status} /></td>
                            <td className="px-4 sm:px-6 py-4 whitespace-nowrap text-right text-sm space-x-2">
                              <select value={m.status} onChange={(e) => updateMeetingStatus(m.id, e.target.value)} className="border-gray-200 rounded-lg text-sm px-3 py-1.5 bg-gray-50 focus:ring-[#FDB827] focus:border-transparent font-medium text-gray-700 cursor-pointer border mb-2 sm:mb-0">
                                <option value="pending">Pending</option>
                                <option value="accepted">Accepted</option>
                                <option value="declined">Declined</option>
                              </select>
                              <button onClick={() => deleteMeeting(m.id)} className="text-red-500 hover:text-red-700 font-bold px-3 py-1.5 rounded-md hover:bg-red-50 transition-colors sm:ml-2">Delete</button>
                            </td>
                          </tr>
                        )
                      })}
                      {meetings.length === 0 && <tr><td colSpan="5" className="px-6 py-12 text-center text-gray-400">No meeting requests found.</td></tr>}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
          </div>

          <Modal isOpen={isAddCompanyModalOpen} onClose={() => setIsAddCompanyModalOpen(false)} title="Add New Company Profile">
            <form onSubmit={handleAddCompany} className="space-y-6 sm:space-y-8">
              <div className="bg-gray-50 p-4 sm:p-6 rounded-2xl border border-gray-100">
                <h4 className="font-bold text-gray-900 mb-4 flex items-center"><span className="bg-gray-200 text-gray-700 w-6 h-6 rounded-full inline-flex items-center justify-center mr-2 text-xs">🔒</span> Login Credentials</h4>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4"><Input label="Login ID" value={newCompany.loginId || ''} onChange={e => setNewCompany({...newCompany, loginId: e.target.value})} required /><Input label="Password" value={newCompany.password || ''} onChange={e => setNewCompany({...newCompany, password: e.target.value})} required /></div>
              </div>
              <div>
                <h4 className="font-bold text-gray-900 border-b border-gray-200 pb-2 mb-4 text-base sm:text-lg">1. Contact Information</h4>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <Input label="Contact Name / Position" value={newCompany.contactName || ''} onChange={e => setNewCompany({...newCompany, contactName: e.target.value})} />
                  <Input label="Mobile Number" value={newCompany.contactPhone || ''} onChange={e => setNewCompany({...newCompany, contactPhone: e.target.value})} />
                  <div className="col-span-1 md:col-span-2"><Input label="Email Address" type="email" value={newCompany.contactEmail || ''} onChange={e => setNewCompany({...newCompany, contactEmail: e.target.value})} /></div>
                </div>
              </div>
              <div>
                <h4 className="font-bold text-gray-900 border-b border-gray-200 pb-2 mb-4 text-base sm:text-lg">2. Company Details</h4>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <Input label="Company Name (En)" value={newCompany.nameEn || ''} onChange={e => setNewCompany({...newCompany, nameEn: e.target.value})} required />

              <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 sm:mb-6 gap-3">
                <h2 className="text-lg sm:text-xl font-bold text-gray-900">Incoming Pitches from Korean Brands</h2>
                {pendingIncomingCount > 0 && <Button onClick={handleAcceptAllIncoming} variant="secondary" className="w-full sm:w-auto">✨ Accept All Pending</Button>}
              </div>
              <div className="bg-white rounded-2xl border border-gray-200 overflow-x-auto shadow-sm">
                <table className="min-w-full divide-y divide-gray-200">
                  <thead className="bg-gray-50">
                    <tr>
                      <th className="px-4 sm:px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Korean Company</th>
                      <th className="px-4 sm:px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Status</th>
                      <th className="px-4 sm:px-6 py-4 text-right text-xs font-bold text-gray-500 uppercase tracking-wider">Actions</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-gray-100">
                    {myIncomingRequests.length === 0 && <tr><td colSpan="3" className="px-6 py-16 text-center text-gray-400 font-medium">No active pitches from companies.</td></tr>}
                    {myIncomingRequests.map(m => {
                      const comp = companies.find(c => c.id === m.companyId);
                      return (
                        <tr key={m.id} className="hover:bg-gray-50 transition-colors">
                          <td className="px-4 sm:px-6 py-4 sm:py-5 whitespace-nowrap">
                            <button onClick={() => setSelectedCompany(comp)} className="text-left group">
                              <span className="block font-bold text-base sm:text-lg text-gray-900 group-hover:text-blue-600 transition-colors">{comp?.brandEn || 'Unknown'}</span>
                              <span className="text-xs sm:text-sm text-gray-500 mt-1">Review Profile &rarr;</span>
                            </button>
                          </td>
                          <td className="px-4 sm:px-6 py-4 sm:py-5 whitespace-nowrap"><Badge status={m.status} /></td>
                          <td className="px-4 sm:px-6 py-4 sm:py-5 text-right space-x-2 whitespace-nowrap">
                            {m.status === 'pending' && (
                              <>
                                <Button onClick={() => handleAcceptMtg(m.id)} className="bg-emerald-500 hover:bg-emerald-600 text-white border-0 ring-0 px-3 py-1.5 sm:px-5 sm:py-2.5">Accept</Button>
                                <Button onClick={() => handleDeclineMtg(m.id)} variant="ghost" className="text-red-500 hover:text-red-700 hover:bg-red-50 px-3 py-1.5 sm:px-5 sm:py-2.5">Decline</Button>
                              </>
                            )}
                          </td>
                        </tr>
                      )
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          <Modal isOpen={!!selectedCompany} onClose={() => setSelectedCompany(null)} title="Brand Profile">
            {selectedCompany && (
              <div className="space-y-6 sm:space-y-8 pb-4">
                <div className="flex flex-col sm:flex-row items-center sm:items-start gap-4 sm:gap-6 bg-white p-5 sm:p-6 rounded-2xl border border-gray-200 shadow-sm relative overflow-hidden">
                   <div className="absolute top-0 right-0 w-24 h-24 sm:w-32 sm:h-32 bg-[#FDB827]/10 rounded-bl-full -z-10"></div>
                   <div className="w-24 h-24 sm:w-32 sm:h-32 bg-white rounded-xl border border-gray-100 shadow-sm flex items-center justify-center p-3 sm:p-4 flex-shrink-0 z-10">
                      {selectedCompany.logoUrl ? <img src={formatDriveLink(selectedCompany.logoUrl)} alt="logo" className="object-contain w-full h-full" /> : <span className="text-gray-300 text-[10px] sm:text-xs uppercase font-bold tracking-widest text-center">No Logo</span>}
                   </div>
                   <div className="text-center sm:text-left z-10 flex-grow w-full">
                      <span className="inline-block px-2 py-1 bg-gray-100 text-gray-600 text-[10px] sm:text-xs font-bold uppercase tracking-wider rounded-md mb-2 sm:mb-3">{selectedCompany.businessType || "Brand"}</span>
                      <h2 className="text-2xl sm:text-4xl font-extrabold text-gray-900 mb-1 sm:mb-2 tracking-tight">{selectedCompany.brandEn}</h2>
                      <p className="text-sm sm:text-lg text-gray-500 font-medium">{selectedCompany.nameEn}</p>
                   </div>
                </div>

                <div>
                  <h4 className="font-extrabold text-gray-900 text-lg sm:text-xl mb-3 sm:mb-4 flex items-center"><span className="text-[#FDB827] mr-2">|</span> Brand Intro & Overview</h4>
                  <div className="bg-gray-50 p-4 sm:p-6 rounded-2xl border border-gray-100 text-sm sm:text-base text-gray-700 leading-relaxed whitespace-pre-wrap font-medium">{selectedCompany.introEn || "No introduction provided."}</div>
                </div>

                <div>
                   <h4 className="font-extrabold text-gray-900 text-lg sm:text-xl mb-3 sm:mb-4 flex items-center"><span className="text-[#FDB827] mr-2">|</span> Products & Capacity</h4>
                   <div className="bg-gray-50 p-4 sm:p-6 rounded-2xl border border-gray-100">
                      <p className="font-bold text-[10px] sm:text-xs text-gray-500 uppercase tracking-wider mb-2">Pricing & MOQ details</p>
                      <p className="text-sm sm:text-base text-gray-900 font-semibold whitespace-pre-wrap">{selectedCompany.moq || "Details not provided."}</p>
                   </div>
                </div>

                {selectedCompany.productImagesLink && (
                   <a href={selectedCompany.productImagesLink} target="_blank" rel="noreferrer" 
                      className="block bg-blue-50/50 hover:bg-blue-50 border border-blue-100 p-4 sm:p-6 rounded-2xl text-center transition-all group shadow-sm">
                      <p className="text-blue-700 font-extrabold text-sm sm:text-lg flex flex-col sm:flex-row items-center justify-center gap-2">
                        <svg className="w-5 h-5 sm:w-6 sm:h-6 transform group-hover:-translate-y-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                        <span className="text-center">Download / View Product Catalog</span>
                      </p>
                   </a>
                )}
                
                <div className="bg-gray-100 text-gray-600 p-3 sm:p-4 rounded-xl text-xs sm:text-sm text-center font-semibold flex flex-col sm:flex-row items-center justify-center gap-2">
                  <svg className="w-4 h-4 sm:w-5 sm:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                  Direct contact info is hidden for platform security.
                </div>

                <div className="mt-6 sm:mt-8 border-t border-gray-200 pt-6 sm:pt-8 flex flex-col sm:flex-row justify-between items-center gap-4 bg-white">
                    <div className="text-center sm:text-left">
                      <h4 className="font-extrabold text-lg sm:text-xl text-gray-900">Interested in this brand?</h4>
                      <p className="text-gray-500 font-medium mt-1 text-sm sm:text-base">Initiate contact through our platform.</p>
                    </div>
                    <div className="w-full sm:w-auto">
                      {!currentMeeting ? (
                         <Button onClick={() => handleRequestMeeting(selectedCompany.id)} className="w-full sm:w-auto px-6 sm:px-10 py-3 sm:py-4 text-sm sm:text-base shadow-xl shadow-amber-200/50">🤝 Request a Meeting</Button>
                      ) : (
                         <div className="px-6 sm:px-8 py-3 sm:py-3.5 rounded-xl font-bold text-gray-700 border-2 border-gray-100 bg-gray-50 flex items-center justify-center w-full sm:w-auto text-sm sm:text-base">
                           Status: <Badge status={currentMeeting.status} className="ml-2 sm:ml-3" />
                         </div>
                      )}
                    </div>
                </div>
              </div>
            )}
          </Modal>
        </div>
      );
    };

    const Layout = ({ sessionRole, setSessionRole, setSessionData, children }) => (
      <div className="min-h-screen bg-gray-50/50 flex flex-col font-sans selection:bg-[#FDB827] selection:text-black">
        <nav className="bg-white border-b border-gray-200 sticky top-0 z-40 shadow-sm backdrop-blur-md bg-white/90">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div className="flex justify-between h-14 sm:h-20 items-center">
              <div className="flex items-center space-x-2 sm:space-x-4">
                 <div className="w-8 h-8 sm:w-10 sm:h-10 bg-[#FDB827] rounded-lg sm:rounded-xl flex items-center justify-center font-black text-gray-900 shadow-md flex-shrink-0 text-sm sm:text-base">A</div>
                 <span className="text-lg sm:text-2xl font-extrabold tracking-tight text-gray-900 truncate max-w-[160px] sm:max-w-none">ASEAN Market Expo</span>
              </div>
              <div className="flex items-center space-x-2 sm:space-x-6">
                 {/* 모바일에서는 Role 뱃지 숨김 */}
                 <span className="hidden sm:inline-block text-xs font-bold px-3 py-1.5 bg-gray-100 rounded-lg text-gray-600 uppercase tracking-widest border border-gray-200">
                   Role: {sessionRole}
                 </span>
                 <Button variant="ghost" onClick={() => { setSessionRole(null); setSessionData(null); }} className="text-xs sm:text-sm border border-gray-200 bg-white px-3 py-1.5 sm:px-5 sm:py-2.5">Log Out</Button>
              </div>
            </div>
          </div>
        </nav>
        <main className="flex-grow pt-4 sm:pt-6 pb-12">{children}</main>
      </div>
    );

    function App() {
      const [sessionRole, setSessionRole] = useState(null);
      const [sessionData, setSessionData] = useState(null);
      const [data, setData] = useState(() => {
        const saved = localStorage.getItem('expo_data');
        return saved ? JSON.parse(saved) : initialData;
      });
      const [alertMsg, setAlertMsg] = useState('');
      const [confirmMsg, setConfirmMsg] = useState('');
      const [onConfirm, setOnConfirm] = useState(null);
      const [isLoading, setIsLoading] = useState(true);

      const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyDK5sINH_5FS8iqmecDQPKk44pfms62mTEdKDKnnqjVsx_ZVAGqxY-l6YRcBFzjstZ9A/exec"; 

      useEffect(() => {
        const fetchGoogleSheetData = async () => {
          if (!APPS_SCRIPT_URL) {
            setIsLoading(false); 
            return;
          }
          try {
            const response = await fetch(APPS_SCRIPT_URL);
            const sheetData = await response.json();
            if (sheetData && Object.keys(sheetData).length > 0) {
              setData(sheetData);
              localStorage.setItem('expo_data', JSON.stringify(sheetData)); 
            }
          } catch (error) {
            console.error("구글 시트 연동 오류 (앱스 스크립트 URL 확인 필요):", error);
          } finally {
            setIsLoading(false);
          }
        };

        fetchGoogleSheetData();
      }, []);

      const handleSetData = (updater) => {
        setData((prev) => {
          const newData = typeof updater === 'function' ? updater(prev) : updater;
          
          localStorage.setItem('expo_data', JSON.stringify(newData));
          
          if (APPS_SCRIPT_URL) {
            fetch(APPS_SCRIPT_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'text/plain;charset=utf-8' },
              body: JSON.stringify(newData),
            }).catch(err => console.error("구글 시트 저장 실패:", err));
          }
          
          return newData;
        });
      };

      const showAlert = (msg) => setAlertMsg(msg);
      const showConfirm = (msg, callback) => { setConfirmMsg(msg); setOnConfirm(() => callback); };
      const handleConfirmExecute = () => { if (onConfirm) onConfirm(); setConfirmMsg(''); setOnConfirm(null); };

      if (isLoading) {
        return (
          <div className="min-h-screen flex items-center justify-center bg-gray-50 relative overflow-hidden px-4">
             <div className="absolute inset-0 bg-cover bg-left lg:bg-center bg-no-repeat opacity-10" style={{ backgroundImage: `url('https://drive.google.com/thumbnail?id=1cPcVCt5c7AOHeAc55OcgfFd3oALFgSft&sz=w1920')` }}></div>
             <div className="relative z-10 flex flex-col items-center bg-white/80 p-6 sm:p-8 rounded-3xl backdrop-blur-sm shadow-xl text-center">
               <div className="w-12 h-12 sm:w-16 sm:h-16 border-4 border-[#FDB827] border-t-transparent rounded-full animate-spin mb-4 sm:mb-6"></div>
               <p className="text-gray-900 font-extrabold text-lg sm:text-xl tracking-tight">데이터를 불러오는 중입니다...</p>
               <p className="text-gray-500 font-medium text-xs sm:text-sm mt-2">Connecting to Google Sheets</p>
             </div>
          </div>
        );
      }

      return (
        <React.Fragment>
          {!sessionRole ? (
            <LoginView setSessionRole={setSessionRole} setSessionData={setSessionData} showAlert={showAlert} data={data} />
          ) : (
            <Layout sessionRole={sessionRole} setSessionRole={setSessionRole} setSessionData={setSessionData}>
              {sessionRole === 'admin' && <AdminDashboard data={data} setData={handleSetData} showAlert={showAlert} showConfirm={showConfirm} />}
              {sessionRole === 'company' && <CompanyDashboard sessionData={sessionData} data={data} setData={handleSetData} showAlert={showAlert} showConfirm={showConfirm} />}
              {sessionRole === 'buyer' && <BuyerDashboard sessionData={sessionData} data={data} setData={handleSetData} showAlert={showAlert} showConfirm={showConfirm} />}
            </Layout>
          )}
          
          <Modal isOpen={!!alertMsg} onClose={() => setAlertMsg('')} title="알림 (Notification)">
            <div className="flex flex-col items-center justify-center text-center py-4">
              <div className="w-12 h-12 sm:w-16 sm:h-16 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center mb-4"><svg className="w-6 h-6 sm:w-8 sm:h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg></div>
              <p className="text-gray-700 text-base sm:text-lg font-bold mb-6 sm:mb-8">{alertMsg}</p>
              <Button onClick={() => setAlertMsg('')} className="w-full sm:w-auto px-8">확인 (OK)</Button>
            </div>
          </Modal>
          
          <Modal isOpen={!!confirmMsg} onClose={() => setConfirmMsg('')} title="확인 필요 (Action Required)">
            <div className="flex flex-col items-center justify-center text-center py-4">
              <div className="w-12 h-12 sm:w-16 sm:h-16 bg-amber-50 text-amber-500 rounded-full flex items-center justify-center mb-4"><svg className="w-6 h-6 sm:w-8 sm:h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg></div>
              <p className="text-gray-700 text-base sm:text-lg font-bold mb-6 sm:mb-8">{confirmMsg}</p>
              <div className="flex flex-col sm:flex-row w-full justify-center gap-3">
                <Button variant="ghost" onClick={() => setConfirmMsg('')} className="w-full sm:w-auto">취소 (Cancel)</Button>
                <Button onClick={handleConfirmExecute} variant="danger" className="w-full sm:w-auto">실행 (Confirm)</Button>
              </div>
            </div>
          </Modal>
        </React.Fragment>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
